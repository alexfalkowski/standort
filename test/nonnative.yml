version: "1.0"
name: standort
url: http://localhost:11000
log: reports/nonnative.log
processes:
  - name: server
    go:
      tools: [cover]
      output: reports
      executable: ../standort
      command: server
      parameters: ["-config file:.config/server.yml"]
    timeout: 5
    wait: 1
    host: 127.0.0.1
    ports:
      - 11000
      - 12000
    log: reports/server.log
    readiness:
      - kind: http
        port: 11000
        path: /standort/readyz
      - kind: grpc
        port: 12000
        service: standort.v1.Service
      - kind: grpc
        port: 12000
        service: standort.v2.Service
