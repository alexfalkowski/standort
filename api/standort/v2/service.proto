syntax = "proto3";

package standort.v2;

import "google/rpc/status.proto";

option go_package = "github.com/alexfalkowski/standort/v2/api/standort/v2";
option ruby_package = "Standort::V2";

// Location of the response.
message Location {
  // ISO-3166 alpha-2 country code, such as US or DE.
  string country = 1;

  // Two-letter continent code, such as NA or EU.
  string continent = 2;
}

// Point for the request.
message Point {
  // Latitude in degrees. Must be finite and in the range [-90, 90].
  double lat = 1;

  // Longitude in degrees. Must be finite and in the range [-180, 180].
  double lng = 2;
}

// GetLocationRequest for getting the location.
message GetLocationRequest {
  // IP address to resolve. If empty, the server may use request metadata such as X-Forwarded-For.
  string ip = 1;

  // Geographic point to resolve. If omitted, the server may use a Geolocation metadata header.
  Point point = 2;
}

// GetLocationResponse for getting the location.
message GetLocationResponse {
  // Meta contains request metadata returned to the caller, such as requestId.
  map<string, string> meta = 1;

  // IP is populated when the IP lookup succeeds.
  Location ip = 2;

  // Geo is populated when the point lookup succeeds.
  Location geo = 3;
}

// LocationLookup is one lookup entry for a batch request.
message LocationLookup {
  // IP address to resolve. If empty, the server may use request metadata such
  // as X-Forwarded-For for this entry.
  string ip = 1;

  // Geographic point to resolve. If omitted, the server may use a Geolocation
  // metadata header for this entry.
  Point point = 2;
}

// LookupLocationsRequest for batch location lookup.
message LookupLocationsRequest {
  // Lookups contains the entries to resolve. At most 100 lookups are supported;
  // larger requests fail the whole call with gRPC InvalidArgument.
  repeated LocationLookup lookups = 1;
}

// LocationLookupResponse is one lookup entry in a batch response.
message LocationLookupResponse {
  // ResolvedLocations contains successful lookup results for this entry.
  message ResolvedLocations {
    // IP is populated when the IP lookup succeeds.
    Location ip = 1;

    // Geo is populated when the point lookup succeeds.
    Location geo = 2;
  }

  // Outcome is either successful locations or the status for an entry that did
  // not resolve any location.
  oneof outcome {
    // Locations is populated when this lookup resolves at least one location.
    ResolvedLocations locations = 1;

    // Status is populated when this lookup does not resolve any location.
    google.rpc.Status status = 2;
  }
}

// LookupLocationsResponse for batch location lookup.
message LookupLocationsResponse {
  // Meta contains request metadata returned to the caller, such as requestId.
  map<string, string> meta = 1;

  // Lookups contains one response for each request lookup, preserving order.
  repeated LocationLookupResponse lookups = 2;
}

// GetLookupAssetsRequest for embedded lookup asset metadata.
message GetLookupAssetsRequest {}

// LookupAsset describes one embedded lookup asset.
message LookupAsset {
  // Name is the embedded asset filename.
  string name = 1;

  // SizeBytes is the embedded asset size in bytes.
  uint64 size_bytes = 2;

  // ChecksumAlgorithm identifies the checksum algorithm used for Checksum.
  string checksum_algorithm = 3;

  // Checksum is the lowercase hexadecimal checksum of the embedded asset.
  string checksum = 4;
}

// GetLookupAssetsResponse for embedded lookup asset metadata.
message GetLookupAssetsResponse {
  // Meta contains request metadata returned to the caller, such as requestId.
  map<string, string> meta = 1;

  // Assets contains metadata for the embedded lookup assets.
  repeated LookupAsset assets = 2;
}

// Service allows to get location via multiple methods.
service Service {
  // GetLocation resolves an IP address and/or geographic point. If one lookup
  // succeeds, the response is successful. Returns gRPC NotFound only when no
  // lookup succeeds; v2 transports may attach code-only diagnostics to the
  // terminal error metadata.
  rpc GetLocation(GetLocationRequest) returns (GetLocationResponse) {}

  // LookupLocations resolves multiple location lookups, preserving request order.
  // Missing entry inputs may fall back to request metadata for each entry.
  rpc LookupLocations(LookupLocationsRequest) returns (LookupLocationsResponse) {}

  // GetLookupAssets returns metadata for embedded lookup assets.
  rpc GetLookupAssets(GetLookupAssetsRequest) returns (GetLookupAssetsResponse) {}
}
