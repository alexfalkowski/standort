syntax = "proto3";

package standort.v1;

option go_package = "github.com/alexfalkowski/standort/v2/api/standort/v1";
option ruby_package = "Standort::V1";

// Location of the response.
message Location {
  // ISO-3166 alpha-2 country code, such as US or DE.
  string country = 1;

  // Two-letter continent code, such as NA or EU.
  string continent = 2;
}

// GetLocationByIPRequest for an IP address.
message GetLocationByIPRequest {
  // IP address to resolve.
  string ip = 1;
}

// GetLocationByIPResponse for an IP address.
message GetLocationByIPResponse {
  // Meta contains request metadata returned to the caller, such as requestId.
  map<string, string> meta = 1;

  // Location resolved from the IP address.
  Location location = 2;
}

// GetLocationByLatLngRequest for a latitude and longitude.
message GetLocationByLatLngRequest {
  // Latitude in degrees. Must be finite and in the range [-90, 90].
  double lat = 1;

  // Longitude in degrees. Must be finite and in the range [-180, 180].
  double lng = 2;
}

// GetLocationByLatLngResponse for a latitude and longitude.
message GetLocationByLatLngResponse {
  // Meta contains request metadata returned to the caller, such as requestId.
  map<string, string> meta = 2;

  // Location resolved from the latitude/longitude point.
  Location location = 1;
}

// Service allows to get locations by different filters.
service Service {
  // GetLocationByIP for an IP address. Returns gRPC NotFound when the IP
  // address cannot be resolved.
  rpc GetLocationByIP(GetLocationByIPRequest) returns (GetLocationByIPResponse) {}

  // GetLocationByLatLng for a latitude and longitude. Returns gRPC NotFound
  // when the point is invalid or cannot be resolved.
  rpc GetLocationByLatLng(GetLocationByLatLngRequest) returns (GetLocationByLatLngResponse) {}
}
