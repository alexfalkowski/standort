version: 2.1

commands:
  sync-submodules:
    steps:
      - run: git submodule sync
      - run: git submodule update --init
  checkout-submodules:
    steps:
      - checkout:
          method: blobless
      - sync-submodules

executors:
  go:
    docker:
      - image: alexfalkowski/go:4.23
  release:
    docker:
      - image: alexfalkowski/release:8.19
  alpine:
    docker:
      - image: alpine:latest

jobs:
  build-service:
    executor: go
    working_directory: ~/standort
    steps:
      - checkout-submodules
      - run: make source-key
      - restore_cache:
          name: restore go cache
          keys:
            - standort-go-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}
            - standort-go-cache-
      - restore_cache:
          name: restore ruby cache
          keys:
            - standort-ruby-cache-{{ checksum "test/Gemfile.lock" }}-{{ checksum "~/.ruby-version" }}
            - standort-ruby-cache-
      - run: make clean
      - run: make dep
      - save_cache:
          name: save go cache
          key: standort-go-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}
          paths:
            - ~/go/pkg/mod
      - save_cache:
          name: save ruby cache
          key: standort-ruby-cache-{{ checksum "test/Gemfile.lock" }}-{{ checksum "~/.ruby-version" }}
          paths:
            - test/vendor
      - restore_cache:
          name: restore go build cache
          keys:
            - standort-go-build-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
            - standort-go-build-cache-
      - restore_cache:
          name: restore go lint cache
          keys:
            - standort-go-lint-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-lint-version" }}-{{ checksum ".source-key" }}
            - standort-go-lint-cache-
      - run: make clean
      - run: make lint
      - save_cache:
          name: save go lint cache
          key: standort-go-lint-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-lint-version" }}-{{ checksum ".source-key" }}
          paths:
            - ~/.cache/golangci-lint
      # TODO: Re-enable after the intentional v2 batch response breaking change lands.
      # - run: make proto-breaking
      - run: make proto-stale
      - run: make sec
      - run: make features
      - run: make benchmarks
      - run: make analyse
      - save_cache:
          name: save go build cache
          key: standort-go-build-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
          paths:
            - ~/.cache/go-build
      - run: make coverage
      - store_test_results:
          path: test/reports
      - store_artifacts:
          path: test/reports
      - run: make codecov-upload
    resource_class: arm.large
  sync:
    executor: release
    working_directory: ~/standort
    steps:
      - checkout-submodules
      - run: make sync push
    resource_class: arm.large
  version:
    executor: release
    working_directory: ~/standort
    steps:
      - checkout-submodules
      - run: make source-key
      - restore_cache:
          name: restore go cache
          keys:
            - standort-go-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}
            - standort-go-cache-
      - restore_cache:
          name: restore go build cache
          keys:
            - standort-go-build-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
            - standort-go-build-cache-
      - run: version
      - persist_to_workspace:
          root: /tmp/workspace
          paths:
            - .
      - run: package
    resource_class: arm.large
  wait-all:
    executor: alpine
    resource_class: small
    steps:
      - run: echo "all applicable jobs finished"
  test-docker-amd64:
    executor: go
    working_directory: ~/standort
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make platform=amd64 test-docker
    resource_class: large
  test-docker-arm64:
    executor: go
    working_directory: ~/standort
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make platform=arm64 test-docker
    resource_class: arm.large
  release-docker-amd64:
    executor: go
    working_directory: ~/standort
    steps:
      - checkout-submodules
      - attach_workspace:
          at: /tmp/workspace
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make platform=amd64 release-docker
    resource_class: large
  release-docker-arm64:
    executor: go
    working_directory: ~/standort
    steps:
      - checkout-submodules
      - attach_workspace:
          at: /tmp/workspace
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make platform=arm64 release-docker
    resource_class: arm.large
  manifest-docker:
    executor: go
    working_directory: ~/standort
    steps:
      - checkout-submodules
      - attach_workspace:
          at: /tmp/workspace
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make manifest-docker
    resource_class: arm.large
  deploy:
    executor: release
    working_directory: ~/standort
    steps:
      - checkout-submodules
      - attach_workspace:
          at: /tmp/workspace
      - run: deploy
    resource_class: arm.large

workflows:
  standort:
    jobs:
      - build-service
      - test-docker-amd64:
          filters:
            branches:
              ignore: master
      - test-docker-arm64:
          filters:
            branches:
              ignore: master
      - sync:
          requires:
            - build-service
            - test-docker-amd64
            - test-docker-arm64
          filters:
            branches:
              ignore: master
      - version:
          context: gh
          serial-group: << pipeline.project.slug >>/version
          requires:
            - build-service
          filters:
            branches:
              only: master
      - release-docker-amd64:
          context: docker
          requires:
            - version
          filters:
            branches:
              only: master
      - release-docker-arm64:
          context: docker
          requires:
            - version
          filters:
            branches:
              only: master
      - manifest-docker:
          context: docker
          serial-group: << pipeline.project.slug >>/manifest-docker
          requires:
            - release-docker-amd64
            - release-docker-arm64
          filters:
            branches:
              only: master
      - deploy:
          context: gh
          requires:
            - manifest-docker
          filters:
            branches:
              only: master
      - wait-all:
          requires:
            - build-service
            - sync
            - test-docker-amd64
            - test-docker-arm64
            - version
            - release-docker-amd64
            - release-docker-arm64
            - manifest-docker
            - deploy
